name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build all themes
        run: nix build .#all

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: result/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Lint CSS
        run: |
          cd src
          for f in base/*.css themes/default.css themes/ocean.css themes/forest.css; do
            echo "Checking $f ..."
            nix develop --command lightningcss --targets '>= 0.25%' "$f" > /dev/null
          done
